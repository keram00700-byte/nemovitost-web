<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This is for you</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #090108; overflow: hidden; }
    canvas { display: block; }
    #message {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.92);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.35rem;
      font-style: italic;
      letter-spacing: 0.08em;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(255,120,160,0.4);
    }
  </style>
</head>
<body>
  <div id="message">this is for you</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x090108);
    document.body.appendChild(renderer.domElement);

    /* ── HEART GEOMETRY ── */
    function heartShape() {
      const s = new THREE.Shape();
      s.moveTo(0, -0.9);
      s.bezierCurveTo(-0.05, -0.75, -0.2,  0.0,  -0.85,  0.1);
      s.bezierCurveTo(-1.6,   0.25, -1.7,  -0.6,  -1.7,  -0.6);
      s.bezierCurveTo(-1.7,  -1.1,  -1.2,  -1.7,   0.0,  -2.5);
      s.bezierCurveTo( 1.2,  -1.7,   1.7,  -1.1,   1.7,  -0.6);
      s.bezierCurveTo( 1.7,  -0.6,   1.6,   0.25,  0.85,  0.1);
      s.bezierCurveTo( 0.2,   0.0,   0.05, -0.75,  0.0,  -0.9);
      return s;
    }

    const extrudeSettings = {
      depth: 0.65,
      bevelEnabled: true,
      bevelSegments: 2,
      steps: 1,
      bevelSize: 0.18,
      bevelThickness: 0.18,
    };

    const heartGeo = new THREE.ExtrudeGeometry(heartShape(), extrudeSettings);
    heartGeo.center();

    const heartMat = new THREE.MeshPhongMaterial({
      color: 0xd4607a,
      emissive: 0x3a0015,
      specular: 0xffffff,
      shininess: 120,
      flatShading: true,
    });

    const heartMesh = new THREE.Mesh(heartGeo, heartMat);
    heartMesh.rotation.x = Math.PI;
    scene.add(heartMesh);

    /* ── LIGHTS ── */
    scene.add(new THREE.AmbientLight(0x1a0010, 1.2));

    const l1 = new THREE.PointLight(0xff80aa, 3.5, 12);
    l1.position.set(4, 3, 4);
    scene.add(l1);

    const l2 = new THREE.PointLight(0xffffff, 1.2, 10);
    l2.position.set(-3, -1, 3);
    scene.add(l2);

    const l3 = new THREE.PointLight(0xff3366, 1.5, 8);
    l3.position.set(0, -4, 1);
    scene.add(l3);

    /* ── PARTICLES ── */
    const count = 3000;
    const positions = new Float32Array(count * 3);
    const colors    = new Float32Array(count * 3);
    const scales    = new Float32Array(count);
    const randoms   = new Float32Array(count);
    const randoms1  = new Float32Array(count);

    const colorChoices = [
      '#ff6b8a', '#ff9eb5', '#ffffff', '#ffccd5',
      '#ff4d70', '#ffb3c1', '#ff8fab', '#c9184a',
      '#ff0a54', '#ffd6e0', '#a8ff78', '#ff78a8',
    ];

    for (let i = 0; i < count; i++) {
      const phi = Math.random() * Math.PI * 2;
      const i3  = 3 * i;

      randoms[i]  = Math.random();
      randoms1[i] = Math.random();
      scales[i]   = Math.random() * 0.35;

      const colorIndex = Math.floor(Math.random() * colorChoices.length);
      const color = new THREE.Color(colorChoices[colorIndex]);
      colors[i3]     = color.r;
      colors[i3 + 1] = color.g;
      colors[i3 + 2] = color.b;

      /* place along a heart-shaped path + scatter */
      const t   = Math.random() * Math.PI * 2;
      const spread = 0.6 + Math.random() * 2.2;

      // heart parametric (normalised)
      const hx =  16 * Math.pow(Math.sin(t), 3);
      const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      const sc = spread / 13;

      positions[i3]     = hx * sc + (Math.random() - 0.5) * 0.7;
      positions[i3 + 1] = hy * sc + (Math.random() - 0.5) * 0.7;
      positions[i3 + 2] = (Math.random() - 0.5) * 2.5;
    }

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const pMat = new THREE.PointsMaterial({
      size: 0.045,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.85,
    });

    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    /* ── ANIMATION ── */
    let t = 0;

    function animate() {
      requestAnimationFrame(animate);
      t += 0.005;

      /* heart: slow Y rotation + gentle tilt */
      heartMesh.rotation.y  = t * 0.7;
      heartMesh.rotation.z  = Math.sin(t * 0.4) * 0.08;

      /* subtle pulse */
      const pulse = 1 + Math.sin(t * 2.2) * 0.04;
      heartMesh.scale.setScalar(pulse);

      /* particles drift slowly */
      particles.rotation.y = t * 0.12;
      particles.rotation.x = Math.sin(t * 0.3) * 0.06;

      /* orbit main light */
      l1.position.x = Math.sin(t * 0.8) * 4;
      l1.position.z = Math.cos(t * 0.8) * 4;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
