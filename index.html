<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prodáme vaši nemovitost rychle a za správnou cenu</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1A1A1A;
  --border: rgba(255,255,255,0.07);
  --accent: #00E87A;
  --accent2: #00C868;
  --text: #F2F2F0;
  --muted: rgba(242,242,240,0.45);
  --green: #00E87A;
  --red: #FF5C5C;
  --radius: 12px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 3rem;
  background: rgba(8,8,8,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700;
  color: var(--text); letter-spacing: 0.03em;
}
.nav-logo span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 1.5rem; }
.nav-link { font-size: 0.82rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-link:hover { color: var(--text); }
.nav-cta {
  background: var(--accent); color: #080808;
  padding: 0.6rem 1.4rem; border-radius: 6px;
  font-size: 0.82rem; font-weight: 600;
  text-decoration: none; transition: all 0.2s;
  letter-spacing: 0.02em;
}
.nav-cta:hover { background: #00C868; transform: translateY(-1px); }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 10rem 3rem 5rem;
  position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 40%, rgba(0,232,122,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(0,232,122,0.03) 0%, transparent 70%);
}
.hero-grid {
  position: absolute; inset: 0; z-index: 0; opacity: 0.03;
  background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.hero-inner { position: relative; z-index: 1; max-width: 800px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: rgba(0,232,122,0.08); border: 1px solid rgba(0,232,122,0.25);
  border-radius: 100px; padding: 0.4rem 1rem;
  font-size: 0.75rem; font-weight: 500; letter-spacing: 0.06em;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 2rem;
  animation: fadeUp 0.5s ease both;
}
.badge-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.2rem, 7vw, 6rem);
  font-weight: 600; line-height: 1.15;
  letter-spacing: 0.01em;
  margin-bottom: 1.75rem;
  animation: fadeUp 0.5s 0.1s ease both;
}
.hero h1 .line2 { color: var(--accent); }
.hero-sub {
  font-size: 1.1rem; color: var(--muted); font-weight: 300;
  max-width: 560px; line-height: 1.75; margin-bottom: 2.5rem;
  animation: fadeUp 0.5s 0.2s ease both;
}
.hero-sub strong { color: var(--text); font-weight: 500; }
.hero-actions {
  display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
  margin-bottom: 3rem;
  animation: fadeUp 0.5s 0.3s ease both;
}
.btn-gold {
  background: var(--accent); color: #080808;
  padding: 1rem 2rem; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600;
  text-decoration: none; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.btn-gold:hover { background: #00C868; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,232,122,0.35); }
.btn-ghost {
  border: 1.5px solid rgba(255,255,255,0.15); color: var(--muted);
  padding: 1rem 2rem; border-radius: 8px;
  font-size: 0.95rem; font-weight: 400;
  text-decoration: none; transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.hero-trust {
  display: flex; gap: 2rem; flex-wrap: wrap;
  animation: fadeUp 0.5s 0.4s ease both;
}
.trust-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--muted); }
.trust-icon { color: var(--green); font-size: 0.9rem; }

/* ── URGENCY BAR ── */
.urgency-bar {
  background: linear-gradient(90deg, rgba(0,232,122,0.06), rgba(0,232,122,0.03));
  border-top: 1px solid rgba(0,232,122,0.15);
  border-bottom: 1px solid rgba(0,232,122,0.15);
  padding: 1rem 3rem;
  display: flex; align-items: center; justify-content: center; gap: 2rem;
  flex-wrap: wrap; text-align: center;
}
.urgency-item { font-size: 0.82rem; color: var(--muted); }
.urgency-item strong { color: var(--accent); font-size: 1.2rem; display: block; font-family: 'Syne', sans-serif; font-weight: 700; }

/* ── SECTION BASE ── */
section { padding: 6rem 3rem; }
.section-label {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 700; line-height: 1.1;
  letter-spacing: -0.02em; margin-bottom: 1.25rem;
}
.section-lead { font-size: 1rem; color: var(--muted); line-height: 1.75; max-width: 520px; }
.container { max-width: 1100px; margin: 0 auto; }

/* ── WHAT IS HOMESTAGING ── */
.what { background: var(--surface); }
.what-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.what-visual {
  background: #1A1A1A; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
  padding: 2.5rem; position: relative; overflow: hidden;
}
.what-visual::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(0,232,122,0.12), transparent 70%);
}
.myth-item {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 1rem 0; border-bottom: 1px solid var(--border);
}
.myth-item:last-child { border-bottom: none; }
.myth-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.myth-text strong { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 2px; }
.myth-text span { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
.what-points { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem; }
.what-point { display: flex; gap: 1rem; align-items: flex-start; }
.what-num {
  font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700;
  color: var(--accent); background: rgba(0,232,122,0.08);
  border: 1px solid rgba(0,232,122,0.2);
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.what-point-text strong { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
.what-point-text span { font-size: 0.83rem; color: var(--muted); line-height: 1.55; }

/* ── HOW WE SELL ── */
.how { background: var(--bg); }
